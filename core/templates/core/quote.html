{% extends 'core/base.html' %}

{% block title %}Request a Quote | Timetells Africa Holdings Ltd{% endblock %}

{% block content %}

<section class="page-banner">

    <div class="container">

        <h1>Request a Quote</h1>

        <p>
            Tell us about your project and our team will get back to you.
        </p>

    </div>

</section>

<section class="quote-section py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="quote-card">

                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Full Name</label>

                                <input type="text" class="form-control" placeholder="Your Name">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Phone Number</label>

                                <input type="text" class="form-control" placeholder="+254...">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Email Address</label>

                            <input type="email" class="form-control" placeholder="example@email.com">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Business Division</label>

                            <select class="form-select">

                                <option>Fabrication & Engineering</option>

                                <option>Logistics & Transport</option>

                                <option>Hospitality (Airbnb Management)</option>

                                <option>Property & Real Estate</option>

                                <option>Investments & Business Development</option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Project Details</label>

                            <textarea class="form-control"
                                      rows="6"
                                      placeholder="Tell us about your project..."></textarea>

                        </div>

                        <button class="btn btn-gold">

                            Submit Request

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
